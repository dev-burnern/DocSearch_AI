services:
  api:
    environment:
      LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_MODEL: ${LOCAL_LLM_MODEL:-gemma3:4b}
      LLM_API_KEY: ${LOCAL_LLM_API_KEY:-ollama}
      LLM_TIMEOUT_SECONDS: ${LOCAL_LLM_TIMEOUT_SECONDS:-180.0}
      LLM_MAX_TOKENS: ${LOCAL_LLM_MAX_TOKENS:-384}
      LLM_TEMPERATURE: ${LOCAL_LLM_TEMPERATURE:-0.0}
      CHAT_RETRIEVAL_LIMIT: ${LOCAL_CHAT_RETRIEVAL_LIMIT:-3}
      CHAT_RERANK_TOP_K: ${LOCAL_CHAT_RERANK_TOP_K:-1}
