services:
  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"

  gateway:
    image: nginx:alpine
    depends_on:
      - frontend
      - api
    ports:
      - "8080:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/nginx.conf:ro

  api:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    environment:
      APP_NAME: DocSearch AI
      APP_ENV: development
      DEBUG: "false"
      DOCSEARCH_API_KEYS: "local-dev-key|local-workspace|Local Workspace|admin;local-member-key|local-workspace|Local Workspace|member"
      DATABASE_URL: postgresql://docsearch:docsearch@postgres:5432/docsearch
      AUDIT_LOG_BACKEND: postgres
      DOCUMENT_METADATA_BACKEND: postgres
      REDIS_URL: redis://redis:6379/0
      INDEXING_QUEUE_BACKEND: redis
      INDEXING_QUEUE_REDIS_KEY: docsearch:indexing:queue
      INDEXING_QUEUE_MAX_ATTEMPTS: "3"
      DEPENDENCY_HEALTH_CHECKS_ENABLED: "true"
      DEPENDENCY_HEALTH_TIMEOUT_SECONDS: "2.0"
      RATE_LIMIT_ENABLED: "false"
      RATE_LIMIT_BACKEND: redis
      RATE_LIMIT_REQUESTS: "120"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      RATE_LIMIT_REDIS_PREFIX: docsearch:rate-limit
      RATE_LIMIT_FAIL_OPEN: "true"
      LLM_BASE_URL: http://llm:8000/v1
      LLM_MODEL: google/gemma-4-E4B-it
      LLM_TIMEOUT_SECONDS: "30.0"
      LLM_MAX_TOKENS: "1024"
      LLM_TEMPERATURE: "0.2"
      CHAT_RETRIEVAL_LIMIT: "5"
      CHAT_RERANK_TOP_K: "5"
      RERANKER_BACKEND: score
      RERANKER_BASE_URL: http://reranker:8001/v1
      RERANKER_MODEL: BAAI/bge-reranker-v2-m3
      RERANKER_TIMEOUT_SECONDS: "10.0"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio
      - llm

  worker:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    command: python -m backend.app.worker
    environment:
      APP_NAME: DocSearch AI
      APP_ENV: development
      DATABASE_URL: postgresql://docsearch:docsearch@postgres:5432/docsearch
      DOCUMENT_METADATA_BACKEND: postgres
      REDIS_URL: redis://redis:6379/0
      INDEXING_QUEUE_BACKEND: redis
      INDEXING_QUEUE_REDIS_KEY: docsearch:indexing:queue
      INDEXING_QUEUE_MAX_ATTEMPTS: "3"
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: docsearch_chunks
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: documents
      MINIO_SECURE: "false"
      CHUNK_MAX_CHARACTERS: "1000"
      CHUNK_OVERLAP_CHARACTERS: "100"
      EMBEDDING_VECTOR_SIZE: "8"
    depends_on:
      - api
      - redis
      - postgres
      - qdrant
      - minio

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docsearch
      POSTGRES_PASSWORD: docsearch
      POSTGRES_DB: docsearch
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "6333:6333"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"

  llm:
    image: vllm/vllm-openai:latest
    ports:
      - "8100:8000"
