name: V2 CI

on:
  push:
    branches:
      - develop
      - "feat/**"
      - "fix/**"
      - "chore/**"
  pull_request:
    branches:
      - develop

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi httpx pytest uvicorn

      - name: Run backend bootstrap tests
        run: python -m pytest backend/tests/test_bootstrap.py -q

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend-v2
        run: npm ci

      - name: Build frontend shell
        working-directory: frontend-v2
        run: npm run build
