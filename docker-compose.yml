# ============================================================
# DocSearch AI - Docker Compose 설정
# 온프레미스 문서 검색 RAG 서버 전체 스택
# ============================================================

version: '3.8'

services:
  # ============================================================
  # API 서버
  # ============================================================
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: docsearch-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DEBUG=false
    env_file:
      - .env
    volumes:
      - ./app:/app/app:ro
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - docsearch-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================
  # Celery Worker (문서 처리)
  # ============================================================
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: docsearch-worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./app:/app/app:ro
      - model_cache:/root/.cache
    depends_on:
      - api
      - redis
      - qdrant
      - minio
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - docsearch-net
    command: celery -A app.worker worker -l INFO -Q documents,gpu -c 1

  # ============================================================
  # PostgreSQL 데이터베이스
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: docsearch-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docsearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docsearch_password}
      POSTGRES_DB: ${POSTGRES_DB:-docsearch}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - docsearch-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docsearch}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis (캐시 + 작업 큐)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: docsearch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - docsearch-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Qdrant 벡터 데이터베이스
  # ============================================================
  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: docsearch-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__STORAGE__STORAGE_PATH: /qdrant/storage
      QDRANT__STORAGE__WAL_CAPACITY_MB: 128
      QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB: 20000
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - docsearch-net

  # ============================================================
  # MinIO 객체 스토리지
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: docsearch-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio_access_key}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_secret_key}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - docsearch-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ============================================================
  # Ollama LLM 서버
  # 호스트에서 이미 실행 중인 경우 이 섹션을 비활성화하세요
  # ============================================================
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: docsearch-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   networks:
  #     - docsearch-net

  # ============================================================
  # React 프론트엔드 (개발용)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docsearch-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - api
    networks:
      - docsearch-net

  # ============================================================
  # Nginx 리버스 프록시
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: docsearch-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    networks:
      - docsearch-net

# ============================================================
# 볼륨 정의
# ============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  minio_data:
    driver: local
  ollama_data:
    driver: local
  model_cache:
    driver: local

# ============================================================
# 네트워크 정의
# ============================================================
networks:
  docsearch-net:
    driver: bridge
